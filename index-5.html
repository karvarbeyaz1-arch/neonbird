  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #04060f; overflow: hidden; user-select: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }

<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, GROUND_H, PIPE_W, GAP;
let frame = 0, state = 'idle';
let score = 0, best = parseInt(localStorage.getItem('fb_best')||'0');
let pipes = [], pipeTimer = 0, particles = [], stars = [], buildings = [];
let cityX = 0, groundX = 0, flashAlpha = 0, deadAnimT = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND_H = Math.round(H * 0.11);
  PIPE_W   = Math.round(W * 0.13);
  GAP      = Math.round(H * 0.17);
  bird.x   = W * 0.22;
  if (state === 'idle') bird.y = H * 0.45;
  initStars(); initBuildings();
}
window.addEventListener('resize', resize);

function initStars() {
  stars = Array.from({length:100}, () => ({
    x: Math.random()*W, y: Math.random()*H*0.78,
    r: Math.random()*1.5+0.2, a: Math.random()*0.6+0.3,
    tw: Math.random()*Math.PI*2, spd: Math.random()*0.3+0.05
  }));
}
function initBuildings() {
  buildings = []; let bx = 0;
  while (bx < W+300) {
    const bw=32+Math.random()*50, bh=60+Math.random()*180;
    buildings.push({x:bx,w:bw,h:bh,wins:Array.from({length:30},()=>Math.random()>0.4)});
    bx += bw+3+Math.random()*6;
  }
}

/* ════════════════════════════════
   BIRD — neon kuş
   ════════════════════════════════ */
const bird = {
  x:0, y:0, vy:0,
  gravity:0.46, jump:-9.0,
  get R(){ return Math.round(H*0.026); },
  rot:0, wobble:0, trail:[],
  wingT: 0,

  reset(){ this.y=H*0.45; this.vy=0; this.rot=0; this.trail=[]; this.wingT=0; },
  flap(){  this.vy=this.jump; this.wobble=9; this.wingT=Math.PI*0.8; burst(this.x,this.y); },

  update(){
    if(state!=='playing'){ this.y=H*0.45+Math.sin(frame*0.045)*12; this.rot=0; this.wingT+=0.10; return; }
    this.vy+=this.gravity; this.vy=Math.min(this.vy,15); this.y+=this.vy;
    this.rot=Math.min(Math.max(this.vy*4.5,-25),90);
    if(this.wobble>0) this.wobble--;
    this.wingT+=0.18;
    this.trail.unshift({x:this.x,y:this.y,a:0.25});
    if(this.trail.length>7) this.trail.pop();
    this.trail.forEach(t=>t.a*=0.70);
  },

  draw(){
    const R = this.R;
    const bw = R*1.15, bh = R*0.88; // daha küçük

    // trail — pembe→cyan gradient iz
    this.trail.forEach((t,i)=>{
      ctx.save();
      ctx.globalAlpha = t.a * 0.55;
      ctx.shadowBlur = 8; ctx.shadowColor = '#FF006E';
      ctx.fillStyle = i < 3 ? '#FF006E' : '#00D4FF';
      const s = 0.48 - i*0.055;
      ctx.beginPath(); ctx.ellipse(t.x,t.y,bw*s,bh*s,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot*Math.PI/180);

    // kanat (gövdenin arkasında)
    const wA = Math.sin(this.wingT)*0.75 - 0.25;
    ctx.save();
    ctx.translate(-bw*0.05, bh*0.1);
    ctx.rotate(wA);
    // kanat gradient: koyu mavi → açık cyan
    const wg = ctx.createLinearGradient(0, 0, 0, -bw*0.7);
    wg.addColorStop(0, '#005f88');
    wg.addColorStop(0.5, '#0099cc');
    wg.addColorStop(1, '#00cfff');
    ctx.shadowBlur=10; ctx.shadowColor='#00D4FF';
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.ellipse(0, -bw*0.18, bw*0.42, bw*0.68, 0, 0, Math.PI*2);
    ctx.fill();
    // kanat üst parlaklık
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(-bw*0.06, -bw*0.26, bw*0.14, bw*0.22, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // kuyruk tüyleri
    ctx.save();
    ctx.translate(-bw*0.88, 0);
    [-0.35, 0, 0.35].forEach((angle, i) => {
      ctx.save();
      ctx.rotate(angle);
      const tg = ctx.createLinearGradient(0,0,-bw*0.55,0);
      tg.addColorStop(0,'#0077aa');
      tg.addColorStop(1,'#00eeff');
      ctx.fillStyle = tg;
      ctx.shadowBlur = 6; ctx.shadowColor = '#00D4FF';
      ctx.beginPath();
      ctx.moveTo(0, -bh*0.12);
      ctx.bezierCurveTo(-bw*0.2,-bh*0.08, -bw*0.45,-bh*0.04, -bw*0.55, 0);
      ctx.bezierCurveTo(-bw*0.45, bh*0.04, -bw*0.2, bh*0.08, 0, bh*0.12);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    });
    ctx.restore();

    // gövde — radyal gradient, parlak
    const bg = ctx.createRadialGradient(-bw*0.2,-bh*0.25,bh*0.05, bw*0.1,bh*0.1,bw*1.1);
    bg.addColorStop(0, '#aaf4ff');
    bg.addColorStop(0.25,'#00D4FF');
    bg.addColorStop(0.7, '#0088bb');
    bg.addColorStop(1,   '#004466');
    ctx.shadowBlur=22; ctx.shadowColor='#00D4FF';
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2); ctx.fill();

    // gövde kenar çizgisi (neon)
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,220,255,0.35)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2); ctx.stroke();

    // göğüs açık ton
    const chest = ctx.createRadialGradient(bw*0.15,bh*0.2,0, bw*0.15,bh*0.2,bw*0.55);
    chest.addColorStop(0,'rgba(180,248,255,0.45)');
    chest.addColorStop(1,'rgba(0,180,220,0)');
    ctx.fillStyle = chest;
    ctx.beginPath(); ctx.ellipse(bw*0.15,bh*0.22,bw*0.5,bh*0.45,0,0,Math.PI*2); ctx.fill();

    // üst highlight (cam parlaması)
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.beginPath(); ctx.ellipse(-bw*0.12,-bh*0.35,bw*0.32,bh*0.22,-0.4,0,Math.PI*2); ctx.fill();

    // göz — büyük, etkileyici
    const ex=bw*0.44, ey=-bh*0.22, er=bh*0.30;
    // göz arkası koyu halka
    ctx.fillStyle='rgba(0,20,40,0.6)';
    ctx.beginPath(); ctx.arc(ex,ey,er*1.25,0,Math.PI*2); ctx.fill();
    // sklera
    const sg=ctx.createRadialGradient(ex-er*0.2,ey-er*0.2,er*0.05,ex,ey,er);
    sg.addColorStop(0,'#ffffff'); sg.addColorStop(1,'#d0f0ff');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
    // iris (neon mavi)
    const ig=ctx.createRadialGradient(ex,ey,0,ex,ey,er*0.72);
    ig.addColorStop(0,'#00aaff');
    ig.addColorStop(1,'#0055aa');
    ctx.fillStyle=ig;
    ctx.beginPath(); ctx.arc(ex,ey,er*0.72,0,Math.PI*2); ctx.fill();
    // pupil
    ctx.fillStyle='#010a14';
    ctx.beginPath(); ctx.arc(ex+er*0.06,ey+er*0.05,er*0.44,0,Math.PI*2); ctx.fill();
    // ana catchlight
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.arc(ex+er*0.18,ey-er*0.18,er*0.20,0,Math.PI*2); ctx.fill();
    // küçük ikinci parlaklık
    ctx.fillStyle='rgba(255,255,255,0.40)';
    ctx.beginPath(); ctx.arc(ex-er*0.14,ey+er*0.22,er*0.09,0,Math.PI*2); ctx.fill();

    // gaga — iki parçalı, şık
    ctx.shadowBlur=8; ctx.shadowColor='#FFD600';
    // üst çene
    ctx.fillStyle='#FFD600';
    ctx.beginPath();
    ctx.moveTo(bw*0.82, -bh*0.08);
    ctx.quadraticCurveTo(bw*1.05, -bh*0.04, bw*1.18, bh*0.02);
    ctx.quadraticCurveTo(bw*1.02, bh*0.06, bw*0.82, bh*0.06);
    ctx.closePath(); ctx.fill();
    // alt çene
    ctx.fillStyle='#e6b800';
    ctx.beginPath();
    ctx.moveTo(bw*0.82, bh*0.07);
    ctx.quadraticCurveTo(bw*1.0, bh*0.10, bw*1.12, bh*0.12);
    ctx.quadraticCurveTo(bw*0.98, bh*0.18, bw*0.82, bh*0.16);
    ctx.closePath(); ctx.fill();
    // gaga highlight
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,245,150,0.55)';
    ctx.beginPath();
    ctx.moveTo(bw*0.84,-bh*0.06);
    ctx.quadraticCurveTo(bw*1.0,-bh*0.02,bw*1.1,bh*0.02);
    ctx.quadraticCurveTo(bw*0.98,bh*0.01,bw*0.84,bh*0.01);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  }
};

function drawWing_UNUSED(ctx, R, wAngle){
  ctx.save();
  // kanat kökü gövdenin üst-ortasından çıkıyor
  ctx.translate(-R*0.10, -R*0.05);
  ctx.rotate(wAngle);

  // Tüy renkleri: uçtan köke doğru kahverengiden sarıya
  const feathers = [
    {len:1.85, angle:-0.28, w:0.20, color:'#6b5018'},
    {len:2.00, angle:-0.14, w:0.22, color:'#7a5c1c'},
    {len:2.05, angle: 0.00, w:0.24, color:'#8a6820'},
    {len:1.95, angle: 0.14, w:0.23, color:'#9a7428'},
    {len:1.75, angle: 0.27, w:0.21, color:'#a88030'},
    {len:1.45, angle: 0.38, w:0.19, color:'#b89040'},
    {len:1.10, angle: 0.47, w:0.17, color:'#c89c48'},
  ];

  feathers.forEach(f => {
    ctx.save();
    ctx.rotate(f.angle);
    const len = R * f.len;
    const hw  = R * f.w;

    // tüy gölgesi
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.moveTo(hw*0.3, 0);
    ctx.bezierCurveTo( hw*0.6, -len*0.35,  hw*0.5, -len*0.75,  hw*0.1,  -len);
    ctx.bezierCurveTo( hw*0.6, -len*0.75,  hw*0.9, -len*0.35,  hw*1.2,   0);
    ctx.closePath(); ctx.fill();

    // tüy dolgusu
    const tg = ctx.createLinearGradient(0,0,0,-len);
    tg.addColorStop(0, f.color);
    tg.addColorStop(0.5, lighten(f.color, 18));
    tg.addColorStop(1,   darken(f.color, 15));
    ctx.fillStyle = tg;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-hw*0.5, -len*0.3, -hw*0.4, -len*0.7,  0,      -len);
    ctx.bezierCurveTo( hw*0.4, -len*0.7,  hw*0.5, -len*0.3,  0,       0);
    ctx.fill();

    // orta damar
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-len*0.88); ctx.stroke();

    ctx.restore();
  });

  // Üst örtü tüyleri (covert) — daha kısa, sarımsı-kahve
  const coverts = [
    {len:0.90, angle:-0.10, color:'#b89838'},
    {len:1.00, angle: 0.08, color:'#c8a840'},
    {len:0.95, angle: 0.24, color:'#d4b448'},
    {len:0.80, angle: 0.38, color:'#c8a840'},
  ];
  coverts.forEach(f => {
    ctx.save(); ctx.rotate(f.angle);
    const len=R*f.len, hw=R*0.16;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.moveTo(0,0);

    ctx.bezierCurveTo( hw*0.6,-len*0.8, hw,-len*0.4,0,0);
    ctx.fill();
    ctx.restore();
  });

  ctx.restore();
}

function drawBeak_UNUSED(ctx, R){

  const bx=R*0.80, by=R*0.04;

  ctx.shadowColor='rgba(160,60,0,0.35)'; ctx.shadowBlur=5;

  ctx.quadraticCurveTo(bx+R*0.38, by+R*0.14, bx,        by+R*0.12);
  ctx.closePath(); ctx.fill();

  // alt gaga
  ctx.fillStyle='#c06000';
  ctx.beginPath();
  ctx.moveTo(bx, by+R*0.12);
  ctx.quadraticCurveTo(bx+R*0.36, by+R*0.16, bx+R*0.55, by+R*0.13);

  // gaga highlight
  ctx.fillStyle='rgba(255,195,55,0.50)';
  ctx.beginPath();
  ctx.moveTo(bx+R*0.04, by-R*0.06);
  ctx.quadraticCurveTo(bx+R*0.36, by+R*0.00, bx+R*0.52, by+R*0.04);

}

// renk yardımcıları
function lighten(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&255)+amt), g=Math.min(255,((n>>8)&255)+amt), b=Math.min(255,(n&255)+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt){ return lighten(hex,-amt); }

/* ── PIPES ── */
function spawnPipe(){
  const minTop=H*0.10, maxTop=H-GROUND_H-GAP-H*0.10;
  const range = maxTop - minTop;
  // Son pipe'ın pozisyonuna göre farklı bir bölgeye zorla
  let lastTop = pipes.length > 0 ? pipes[pipes.length-1].topH : (minTop + range/2);
  // Ekranı 3 bölgeye böl: üst / orta / alt
  const zone1End = minTop + range*0.33;
  const zone2End = minTop + range*0.66;
  let lastZone = lastTop < zone1End ? 0 : lastTop < zone2End ? 1 : 2;
  // Bir öncekinden farklı rastgele bölge seç
  let newZone;
  const roll = Math.random();
  if (lastZone === 0) {
    newZone = roll < 0.5 ? 1 : 2;
  } else if (lastZone === 1) {
    newZone = roll < 0.5 ? 0 : 2;
  } else {
    newZone = roll < 0.5 ? 0 : 1;
  }
  // Seçilen bölge içinde rastgele bir nokta
  const zoneMin = minTop + newZone * range/3;
  const zoneMax = minTop + (newZone+1) * range/3;
  const topH = zoneMin + Math.random() * (zoneMax - zoneMin);
  pipes.push({x:W+PIPE_W, topH, scored:false});
}

  function cG(){const g=ctx.createLinearGradient(x-capE,0,x+PIPE_W+capE,0);g.addColorStop(0,'#0a3412');g.addColorStop(0.14,'#146026');g.addColorStop(0.36,'#22943e');g.addColorStop(0.54,'#1c8036');g.addColorStop(0.76,'#0e4c1a');g.addColorStop(1,'#051e08');return g;}
  // top
  ctx.fillStyle=bG();ctx.fillRect(x,0,PIPE_W,topH);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+PIPE_W*.10,0,PIPE_W*.16,topH);

  ctx.fillStyle=cG();ctx.shadowColor='rgba(0,210,70,0.25)';ctx.shadowBlur=10;
  ctx.beginPath();ctx.roundRect(x-capE,topH-capH,PIPE_W+capE*2,capH,[0,0,6,6]);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fillRect(x-capE+5,topH-capH+4,(PIPE_W+capE*2)*.20,capH-8);
  ctx.strokeStyle='rgba(0,240,80,0.14)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x-capE,topH-capH);ctx.lineTo(x+PIPE_W+capE,topH-capH);ctx.stroke();
  // bottom
  ctx.fillStyle=bG();ctx.fillRect(x,botY,PIPE_W,botH);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+PIPE_W*.10,botY,PIPE_W*.16,botH);
  ctx.fillStyle='rgba(0,0,0,0.14)';ctx.fillRect(x+PIPE_W*.74,botY,PIPE_W*.16,botH);

  ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fillRect(x-capE+5,botY+4,(PIPE_W+capE*2)*.20,capH-8);

}

/* ── GROUND — sade realistik çimen ── */
function drawGround(){
  const gy=H-GROUND_H;

  // toprak
  const soil=ctx.createLinearGradient(0,gy,0,H);
  soil.addColorStop(0,'#2e5c18'); soil.addColorStop(0.22,'#1e400e'); soil.addColorStop(1,'#0c1c06');
  ctx.fillStyle=soil; ctx.fillRect(0,gy,W,GROUND_H);

  // çimen taban bandı — düz gradient, göz yormayan
  const grassH=GROUND_H*0.42;
  const grassG=ctx.createLinearGradient(0,gy,0,gy+grassH);
  grassG.addColorStop(0,'#52c83c');
  grassG.addColorStop(0.5,'#3aa028');
  grassG.addColorStop(1,'#267814');
  ctx.fillStyle=grassG; ctx.fillRect(0,gy,W,grassH);

  // çok ince üst parlaklık çizgisi
  ctx.fillStyle='rgba(140,255,100,0.12)'; ctx.fillRect(0,gy,W,2);

  // sade çimen blade'leri — sayısı az, boyları benzer, renk sakin
  const count=28;
  const spacing=W/count;
  for(let i=0;i<count+1;i++){
    const baseX=((groundX*0.9+i*spacing)%(W+spacing)+W+spacing)%(W+spacing)-spacing*0.5;
    // her noktada 2 blade, hafif ayrık
    [-3,3].forEach(offset=>{
      const bx=baseX+offset;
      // blade boyu çok benzer, küçük varyasyon
      const bh=grassH*(0.78+Math.sin(i*1.7+offset)*0.14);
      // hafif sağa-sola eğim
      const lean=Math.sin(i*0.9+offset*0.5)*0.12;

      const bg=ctx.createLinearGradient(bx,gy,bx+lean*bh,gy-bh);
      bg.addColorStop(0,'#2e8a18');
      bg.addColorStop(0.6,'#46b828');
      bg.addColorStop(1,'#72d840');
      ctx.fillStyle=bg;
      ctx.beginPath();
      ctx.moveTo(bx-2.5, gy);
      ctx.quadraticCurveTo(bx+lean*bh*0.5-1, gy-bh*0.55, bx+lean*bh, gy-bh);
      ctx.quadraticCurveTo(bx+lean*bh*0.5+1, gy-bh*0.55, bx+2.5,     gy);
      ctx.fill();
    });
  }
}

  const bw=pw*.60,bh=H*.055,bx2=(W-bw)/2,by2=py+ph*.845;
  const bg2=ctx.createLinearGradient(bx2,by2,bx2+bw,by2);
  bg2.addColorStop(0,'#00c8ff'); bg2.addColorStop(1,'#007ac2');
  ctx.fillStyle=bg2; ctx.shadowColor='rgba(0,200,255,0.5)'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.roundRect(bx2,by2,bw,bh,bh/2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.roundRect(bx2+4,by2+3,bw-8,bh/2-2,bh/2); ctx.fill();
  ctx.fillStyle='#00111f'; ctx.font=`700 ${Math.round(H*.024)}px "Segoe UI",sans-serif`;
  ctx.fillText('PLAY AGAIN',W/2,by2+bh*.64);
  ctx.restore();
}

function checkHit(){
  const R=bird.R*0.60;
  if(bird.y+R>H-GROUND_H||bird.y-R<0) return true;
  for(const p of pipes){
    const capE=PIPE_W*0.16;
    if(bird.x+R>p.x-capE&&bird.x-R<p.x+PIPE_W+capE){if(bird.y-R<p.topH||bird.y+R>p.topH+GAP) return true;}
  }
  return false;
}
function tickScore(){
  pipes.forEach(p=>{if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;flashAlpha=1;if(score>best){best=score;localStorage.setItem('fb_best',best);}}});
}

const PIPE_INTERVAL=()=>Math.round(W*0.40);
const PIPE_SPEED=()=>W*0.0040+1.6;

function loop(){
  frame++;
  if(state==='playing') groundX-=2.8;
  drawBackground();
  if(state==='playing'){
    pipeTimer++;
    if(pipeTimer>=PIPE_INTERVAL()){spawnPipe();pipeTimer=0;}
    const spd=PIPE_SPEED();
    pipes.forEach(p=>p.x-=spd);
    pipes=pipes.filter(p=>p.x+PIPE_W*1.2>0);
  }
  pipes.forEach(drawPipe);
  drawGround();
  tickParticles(); drawParticles();
  bird.update(); bird.draw();
  if(state==='playing'){tickScore();if(checkHit())die();}
  if(flashAlpha>0){ctx.fillStyle=`rgba(255,230,50,${flashAlpha*.11})`;ctx.fillRect(0,0,W,H);flashAlpha-=0.06;}
  if(state!=='idle') drawHUD();
  if(state==='idle')  drawIdle();
  if(state==='dead')  drawDead();
  requestAnimationFrame(loop);
}

function startGame(){state='playing';score=0;pipes=[];pipeTimer=0;particles=[];deadAnimT=0;bird.reset();}
function die(){state='dead';deadAnimT=0;}
function input(){
  if(state==='idle'){startGame();bird.flap();}
  else if(state==='playing') bird.flap();
  else if(state==='dead') startGame();
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();input();}});
canvas.addEventListener('click',input);
canvas.addEventListener('touchstart',e=>{e.preventDefault();input();},{passive:false});

resize(); loop();
</script>
</body>
